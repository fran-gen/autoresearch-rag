services:
  api:
    image: hackathon-lab-app:latest
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001
    env_file:
      - .env
    environment:
      - KARPATHY_SANDBOX_IMAGE=hackathon-lab-app:latest
      - KARPATHY_HF_CACHE_HOST_PATH=${PWD}/.hf_cache
      - KARPATHY_DATA_HOST_PATH=${PWD}/data
      - KARPATHY_QDRANT_HOST_PATH=${PWD}/index/qdrant_data
      - KARPATHY_SANDBOX_MEMORY=3g
      - QDRANT_PATH=/app/index/qdrant_data
    volumes:
      - ./:/app
      - flask_sessions:/flask_sessions
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/up', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

  dashboard:
    image: hackathon-lab-app:latest
    build: .
    command: python src/dashboard/app.py
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8001
      - QDRANT_PATH=/app/index/qdrant_data
    volumes:
      - ./:/app
      - flask_sessions:/flask_sessions
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  flask_sessions:

