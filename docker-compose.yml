services:
  api:
    image: hackathon-lab-app:latest
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001
    cpus: "${API_CPUS:-1.5}"
    env_file:
      - .env
    environment:
      - MODEL_INFERENCE_THREADS=${MODEL_INFERENCE_THREADS:-1}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${NUMEXPR_NUM_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${VECLIB_MAXIMUM_THREADS:-1}
      - TOKENIZERS_PARALLELISM=false
      - RETRIEVE_TOP_K_CAP=${RETRIEVE_TOP_K_CAP:-24}
      - RERANK_CANDIDATE_CAP=${RERANK_CANDIDATE_CAP:-24}
      - KARPATHY_SANDBOX_IMAGE=hackathon-lab-app:latest
      - KARPATHY_HF_CACHE_HOST_PATH=${PWD}/.hf_cache
      - KARPATHY_DATA_HOST_PATH=${PWD}/data
      - KARPATHY_QDRANT_HOST_PATH=${PWD}/index/qdrant_data
      - KARPATHY_SANDBOX_MEMORY=3g
      - KARPATHY_SANDBOX_CPUS=${KARPATHY_SANDBOX_CPUS:-0.5}
      - KARPATHY_SANDBOX_THREADS=${KARPATHY_SANDBOX_THREADS:-1}
      - QDRANT_PATH=/app/index/qdrant_data
    volumes:
      - ./:/app
      - flask_sessions:/flask_sessions
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/up', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

  dashboard:
    image: hackathon-lab-app:latest
    build: .
    command: python src/dashboard/app.py
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8001
      - QDRANT_PATH=/app/index/qdrant_data
    volumes:
      - ./:/app
      - flask_sessions:/flask_sessions
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  flask_sessions:
